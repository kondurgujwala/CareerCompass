<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerCompass - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>CareerCompass</h1>
                <p>Navigate Your Career with Confidence</p>
            </div>

            <h2 class="login-title">Welcome Back</h2>
            <p class="login-subtitle">Sign in to your account</p>

            <div id="errorMsg" style="display:none; color:#ef4444; background:#fef2f2; border:1px solid #fecaca; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px;"></div>
            <div id="successMsg" style="display:none; color:#16a34a; background:#f0fdf4; border:1px solid #bbf7d0; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px;"></div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%;" id="loginBtn">
                    Login
                </button>
            </form>

            <p class="login-footer">
                Don't have an account? <a href="signup.html">Sign up here</a>
            </p>
        </div>
    </div>

    <script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const btn = document.getElementById('loginBtn');
    const errorEl = document.getElementById('errorMsg');

    btn.textContent = 'Logging in...';
    btn.disabled = true;
    errorEl.style.display = 'none';

    try {
        const formData = new FormData(this);

        // 1. Fetching from the relative backend path
        // 2. Setting credentials to 'include' for PHP Session cookies
        const response = await fetch("../Backend/Login.php", {
            method: "POST",
            body: formData,
            headers: {
                "Accept": "application/json"
            },
            credentials: "include"
        });

        console.log("RAW RESPONSE:", response);

        const text = await response.text();
        console.log("TEXT:", text);

        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }

        // 3. Extract JSON safely from potential PHP warnings/errors
        let result = null;
        try {
            // Look for first '{' and last '}' to ignore any PHP garbage text
            const jsonStart = text.indexOf('{');
            const jsonEnd = text.lastIndexOf('}');
            
            if (jsonStart !== -1 && jsonEnd !== -1) {
                const cleanedJson = text.substring(jsonStart, jsonEnd + 1);
                result = JSON.parse(cleanedJson);
            } else {
                throw new Error("No JSON object found in response");
            }
        } catch (parseErr) {
            console.error("JSON Parse Error:", parseErr, "Raw Text:", text);
            throw new Error("Failed to parse server response");
        }

        console.log("PARSED JSON:", result);

        // 4. Handle logical success or failure
        if (result.success === true) {
            // Redirect explicitly to dashboard.html in current folder
            window.location.href = "dashboard.html";
        } else {
            errorEl.textContent = result.message || "Invalid credentials.";
            errorEl.style.display = "block";
            btn.textContent = "Login";
            btn.disabled = false;
        }

    } catch (err) {
        console.error("LOGIN ERROR:", err);
        errorEl.textContent = "Server error or connection issue. Check console.";
        errorEl.style.display = "block";
        btn.textContent = "Login";
        btn.disabled = false;
    }
});
</script>
</body>
</html>
