<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerCompass - Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="signup-container">
        <div class="signup-card">
            <div class="signup-header">
                <h1>CareerCompass</h1>
                <p>Navigate Your Career with Confidence</p>
            </div>
 
            <h2 class="signup-title">Create Your Account</h2>
            <p class="signup-subtitle">Join CareerCompass to get personalized career recommendations</p>
 
            <div id="errorMsg" style="display:none; color:#ef4444; background:#fef2f2; border:1px solid #fecaca; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px;"></div>
            <div id="successMsg" style="display:none; color:#16a34a; background:#f0fdf4; border:1px solid #bbf7d0; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px;"></div>
 
            <form class="signup-form" id="signupForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>
 
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
 
                <div class="form-group">
                    <label for="cgpa">CGPA (0.0 - 10.0)</label>
                    <input type="number" id="cgpa" name="cgpa" placeholder="8.5" min="0" max="10" step="0.1">
                </div>
 
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
 
                <button type="submit" class="btn btn-primary" style="width:100%;" id="signupBtn">Sign Up</button>
            </form>
 
            <p class="signup-footer">
                Already have an account? <a href="login.html">Login here</a>
            </p>
        </div>
    </div>
 
  <script>
document.getElementById('signupForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const btn = document.getElementById('signupBtn');
    const errorEl = document.getElementById('errorMsg');
    const successEl = document.getElementById('successMsg');

    btn.textContent = 'Creating account...';
    btn.disabled = true;
    errorEl.style.display = 'none';
    successEl.style.display = 'none';

    try {
        const formData = new FormData(this);

        const response = await fetch('../Backend/Signup.php', {
            method: 'POST',
            body: formData
        });

        const text = await response.text();
        console.log(text);

        let result;

        try {
            result = JSON.parse(text);
        } catch (e) {
            throw new Error(text);
        }

        if (result.success) {
            successEl.textContent = result.message;
            successEl.style.display = 'block';

            setTimeout(() => {
                window.location.href = result.redirect;
            }, 1000);

        } else {
            errorEl.textContent = result.message;
            errorEl.style.display = 'block';
            btn.textContent = 'Sign Up';
            btn.disabled = false;
        }

    } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.textContent = 'Sign Up';
        btn.disabled = false;
    }
});
</script>
</body>
</html>
